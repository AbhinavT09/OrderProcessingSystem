spring:
  datasource:
    url: jdbc:h2:mem:ordersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      ack-mode: record

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-to-a-strong-32-char-secret}
    rate-limit:
      requests: 120
      window-ms: 60000
  kafka:
    order-events-topic: order.events
    consumer-group: order-processing-group
    processing-delay-ms: 300000
    processing-delay-multiplier: 2.0
    processing-delay-max-ms: 3600000
    delayed-processing-attempts: 12
    publisher:
      max-retries: 3
      retry-backoff-ms: 300
      circuit-breaker:
        failure-threshold: 5
        open-seconds: 20
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles:
        http.server.request.latency: 0.95,0.99
        orders.operation.duration: 0.95,0.99
        orders.query.duration: 0.95,0.99
        kafka.consumer.lag.ms: 0.95,0.99

logging:
  pattern:
    console: "{\"timestamp\":\"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}\",\"level\":\"%p\",\"logger\":\"%logger{36}\",\"message\":\"%msg\",\"request_id\":\"%X{request_id:-na}\",\"order_id\":\"%X{order_id:-na}\",\"trace_id\":\"%X{traceId:-na}\"}%n"
  level:
    com.example.orderprocessing: INFO
