title: Order Processing System Docs
description: Architecture and implementation guide
markdown: kramdown
remote_theme: just-the-docs/just-the-docs
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 15
  tokenizer_separator: /[\s/]+/
  rel_url: true
heading_anchors: true
permalink: pretty
back_to_top: true
back_to_top_text: "Back to top"
footer_content: "Order Processing System documentation"

aux_links:
  "View Repository":
    - "https://github.com/"

nav_sort: case_insensitive
last_edit_timestamp: false

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

nav_external_links:
  - title: GitHub Repository
    url: https://github.com/
    hide_icon: false
