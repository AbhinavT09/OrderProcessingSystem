<header class="site-header" role="banner">
  <div class="header-content">
    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <div class="header-right">
      <div class="header-icons">
        <a
          href="https://github.com/AbhinavT09/OrderProcessingSystem"
          class="header-github-link"
          aria-label="GitHub repository"
          target="_blank"
          rel="noopener noreferrer"
        ></a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-toggle-icon">🌙</span>
        </button>
      </div>
      <div class="search-container">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              d="M10.25 2a8.25 8.25 0 0 1 6.34 13.53l5.69 5.69a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215l-5.69-5.69A8.25 8.25 0 1 1 10.25 2ZM3.5 10.25a6.75 6.75 0 1 0 13.5 0 6.75 6.75 0 0 0-13.5 0Z"
            ></path>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search..." autocomplete="off" />
        </div>
        <div id="search-results" class="search-results hidden"></div>
      </div>
    </div>
  </div>
</header>
